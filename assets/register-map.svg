<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="540" viewBox="0 0 1280 540" role="img" aria-label="AES-256 register map overview">
  <defs>
    <style>
      .bg{fill:#ffffff}.title{font:700 26px Arial, sans-serif;fill:#172033}.label{font:700 15px Arial, sans-serif;fill:#172033}.text{font:500 13px Arial, sans-serif;fill:#475467}.ctrl{fill:#dbeafe;stroke:#1d4ed8}.key{fill:#dcfce7;stroke:#15803d}.iv{fill:#fef3c7;stroke:#b45309}.data{fill:#fce7f3;stroke:#be185d}.gcm{fill:#ede9fe;stroke:#7c3aed}.misc{fill:#e5e7eb;stroke:#4b5563}
    </style>
  </defs>
  <rect class="bg" width="1280" height="540" rx="14"/>
  <text x="38" y="48" class="title">AXI4-Lite Register Address Space</text>
  <text x="38" y="76" class="text">8-bit address, 32-bit data, word-aligned control/status/data registers</text>
  <g transform="translate(38 116)">
    <rect x="0" y="0" width="190" height="70" rx="8" class="ctrl"/><text x="18" y="28" class="label">0x00 CTRL</text><text x="18" y="52" class="text">START, ENC_DEC, MODE</text>
    <rect x="210" y="0" width="190" height="70" rx="8" class="ctrl"/><text x="228" y="28" class="label">0x04 STATUS</text><text x="228" y="52" class="text">BUSY, DONE, KEY_READY</text>
    <rect x="420" y="0" width="190" height="70" rx="8" class="ctrl"/><text x="438" y="28" class="label">0x08 IRQ_EN</text><text x="438" y="52" class="text">DOUT_VALID, TAG_VALID</text>
    <rect x="630" y="0" width="190" height="70" rx="8" class="ctrl"/><text x="648" y="28" class="label">0x0C IRQ_STAT</text><text x="648" y="52" class="text">Write-one-to-clear</text>
    <rect x="840" y="0" width="190" height="70" rx="8" class="misc"/><text x="858" y="28" class="label">0x80 DIN_CTRL</text><text x="858" y="52" class="text">din_last, aad_last</text>
    <rect x="1050" y="0" width="190" height="70" rx="8" class="misc"/><text x="1068" y="28" class="label">0x84 VERSION</text><text x="1068" y="52" class="text">0x0001_0000</text>
  </g>
  <g transform="translate(38 230)">
    <rect x="0" y="0" width="300" height="78" rx="8" class="key"/><text x="18" y="31" class="label">0x10 - 0x2C KEY0..KEY7</text><text x="18" y="56" class="text">256-bit AES key, little register order</text>
    <rect x="322" y="0" width="250" height="78" rx="8" class="iv"/><text x="340" y="31" class="label">0x30 - 0x3C IV0..IV3</text><text x="340" y="56" class="text">128-bit IV / nonce / counter seed</text>
    <rect x="594" y="0" width="250" height="78" rx="8" class="data"/><text x="612" y="31" class="label">0x40 - 0x4C DIN0..DIN3</text><text x="612" y="56" class="text">128-bit input block</text>
    <rect x="866" y="0" width="250" height="78" rx="8" class="data"/><text x="884" y="31" class="label">0x50 - 0x5C DOUT0..DOUT3</text><text x="884" y="56" class="text">128-bit output block</text>
  </g>
  <g transform="translate(38 348)">
    <rect x="0" y="0" width="360" height="78" rx="8" class="gcm"/><text x="18" y="31" class="label">0x60 - 0x6C AAD0..AAD3</text><text x="18" y="56" class="text">GCM additional authenticated data block</text>
    <rect x="420" y="0" width="360" height="78" rx="8" class="gcm"/><text x="438" y="31" class="label">0x70 - 0x7C TAG0..TAG3</text><text x="438" y="56" class="text">GCM authentication tag output</text>
  </g>
  <text x="38" y="486" class="text">Reserved addresses return an error response or default data depending on channel path. Software should only access documented offsets.</text>
</svg>
